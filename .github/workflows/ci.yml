name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Upload vendor directory
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor/
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Test (PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }})

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 11
          - php: '8.2'
            laravel: '11.*'
            testbench: '^9.0'
            pest-plugin-laravel: '^3.1'
          - php: '8.3'
            laravel: '11.*'
            testbench: '^9.0'
            pest-plugin-laravel: '^3.1'
          - php: '8.4'
            laravel: '11.*'
            testbench: '^9.0'
            pest-plugin-laravel: '^3.1'
          # Laravel 12
          - php: '8.2'
            laravel: '12.*'
            testbench: '^10.2'
            pest-plugin-laravel: '^3.1'
          - php: '8.3'
            laravel: '12.*'
            testbench: '^10.2'
            pest-plugin-laravel: '^3.1'
          - php: '8.4'
            laravel: '12.*'
            testbench: '^10.2'
            pest-plugin-laravel: '^3.1'
          # Laravel 13 (PHP 8.3+ only — enforced by Laravel itself)
          - php: '8.3'
            laravel: '13.*'
            testbench: '^11.0'
            pest-plugin-laravel: '^4.0'
          - php: '8.4'
            laravel: '13.*'
            testbench: '^11.0'
            pest-plugin-laravel: '^4.0'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-
            ${{ runner.os }}-composer-

      - name: Install dependencies (Laravel ${{ matrix.laravel }})
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "pestphp/pest-plugin-laravel:${{ matrix.pest-plugin-laravel }}" \
            --no-interaction --no-update --dev
          composer update --no-interaction --prefer-dist --with-all-dependencies

      - name: Run Unit tests
        env:
          XDEBUG_MODE: off
        run: php vendor/bin/pest tests/Unit --no-coverage

      - name: Run Feature tests
        env:
          XDEBUG_MODE: off
        run: php vendor/bin/pest tests/Feature --no-coverage

  benchmark:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Benchmark
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Download vendor directory
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Fix vendor permissions
        run: chmod -R +x vendor/bin/

      - name: Check if phpbench exists
        id: check-phpbench
        run: |
          if [ -f "./vendor/bin/phpbench" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run benchmarks
        if: steps.check-phpbench.outputs.exists == 'true'
        run: ./vendor/bin/phpbench run --report=default
