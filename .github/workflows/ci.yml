name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Upload vendor directory
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor/
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Test (PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }})

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 12 (PHP 8.3+ — floor raised in 2.2.0 by the
          # artisanpack-ui/ai foundation dep, which requires PHP ^8.3).
          - php: '8.3'
            laravel: '12.*'
            testbench: '^10.2'
            pest-plugin-laravel: '^3.1'
          - php: '8.4'
            laravel: '12.*'
            testbench: '^10.2'
            pest-plugin-laravel: '^3.1'
          # Laravel 13
          - php: '8.3'
            laravel: '13.*'
            testbench: '^11.0'
            pest-plugin-laravel: '^4.0'
          - php: '8.4'
            laravel: '13.*'
            testbench: '^11.0'
            pest-plugin-laravel: '^4.0'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-
            ${{ runner.os }}-composer-

      # Laravel 11.x is currently blocked at install time by five active Packagist
      # advisories that collectively cover v11.0.0 – v11.54.0. Until upstream
      # Laravel cuts a patched 11.x tag, the L11 matrix rows declare those IDs in
      # policy.advisories.ignore-id so composer's resolver will still consider the
      # already-required-minimum (^11.44.1, which itself raises the floor past the
      # oldest advisory) — keeping the L11 install smoke-test alive. Composer
      # audit on the package's own lock (which targets L12) is unaffected.
      - name: Allow upstream Laravel 11 advisories during resolution
        if: matrix.laravel == '11.*'
        run: |
          composer config --json policy.advisories.ignore-id \
            '["PKSA-mdq4-51ck-6kdq","PKSA-8qx3-n5y5-vvnd","PKSA-q46n-4fdk-zjr4","PKSA-qzrn-rnz3-85w1","PKSA-w7xr-vk7n-rstm"]'

      - name: Install dependencies (Laravel ${{ matrix.laravel }})
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "pestphp/pest-plugin-laravel:${{ matrix.pest-plugin-laravel }}" \
            --no-interaction --no-update --dev
          composer update --no-interaction --prefer-dist --with-all-dependencies

      - name: Run Unit tests
        env:
          XDEBUG_MODE: off
        run: php vendor/bin/pest tests/Unit --no-coverage

      - name: Run Feature tests
        env:
          XDEBUG_MODE: off
        run: php vendor/bin/pest tests/Feature --no-coverage

  benchmark:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Benchmark
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Download vendor directory
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Fix vendor permissions
        run: chmod -R +x vendor/bin/

      - name: Check if phpbench exists
        id: check-phpbench
        run: |
          if [ -f "./vendor/bin/phpbench" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run benchmarks
        if: steps.check-phpbench.outputs.exists == 'true'
        run: ./vendor/bin/phpbench run --report=default
